# Render Blueprint - UletiSmenu API (staging)
# Repo: https://github.com/lukavi44/uleti-smenu-backend
# Dashboard: New > Blueprint > connect repo, Blueprint path: render.yaml

services:
  - type: web
    name: uletismenu-api-staging
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: UletiSmenu
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Staging
      # Avoid inotify "user limit (128) ... reached" during CreateBuilder on Render.
      # Prefer env vars for production config; do not use dotnet watch in production.
      - key: DOTNET_USE_POLLING_FILE_WATCHER
        value: "1"
      - key: ConnectionStrings__UletiSmenu
        sync: false
      - key: Cors__AllowedOrigins__0
        value: https://uletismenu-web-staging.onrender.com
      - key: Cors__AllowedOrigins__1
        value: http://localhost:5173
      - key: FileSettings__UploadPath
        value: /app/uploads
      - key: DataProtection__KeysPath
        value: /app/data-protection-keys
      - key: Stripe__Enabled
        value: "false"
      - key: AdminSeed__Enabled
        value: "true"
      - key: AdminSeed__Email
        sync: false
      - key: AdminSeed__Password
        sync: false
